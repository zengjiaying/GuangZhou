<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome to Guangzhou</title>
<link rel="stylesheet" href="style.css">

<style>
/* 专门给 welcome 页用 */
.welcome-page {
    height: 100vh;
    background: url("images/banner.jpg") no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.welcome-box {
    background: rgba(0,0,0,0.5);
    padding: 40px 60px;
    border-radius: 12px;
    text-align: center;
    color: white;
}

.welcome-box h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

.welcome-box p {
    font-size: 20px;
    margin-bottom: 30px;
}

/* 按钮 */
.enter-btn {
    padding: 12px 25px;
    background: #ff6600;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 6px;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #ff8533;
}
</style>

</head>

<body class="welcome-page">

<div class="welcome-box">
    <h1>Welcome to My Hometown</h1>
    <p>Guangzhou </p>
    <a href="pge2.html" class="enter-btn" onclick="location.href='index.html'">
    Enter Website
</a>
</div>

</body>
</html>
